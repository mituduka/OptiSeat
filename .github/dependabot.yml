version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - "component: backend"
      - "priority: low"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - "component: frontend"
      - "priority: low"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "priority: low"
